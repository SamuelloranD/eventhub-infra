services:
  db:
    image: postgres:15
    container_name: eventhub_db
    environment:
      POSTGRES_DB: eventhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: ../eventhub-backend
    container_name: eventhub_backend
    ports:
      - "8080:8080"
    depends_on:
      - db